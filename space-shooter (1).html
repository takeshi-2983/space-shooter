<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>NOVA STRIKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #gameContainer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #05060f;
  }

  canvas#gameCanvas { display: block; }

  #scoreDisplay {
    position: fixed; top: 12px; left: 16px;
    font-family: 'Orbitron', monospace; font-size: 14px;
    color: #00f0ff; z-index: 20;
    text-shadow: 0 0 10px rgba(0,240,255,0.5); letter-spacing: 2px; display: none;
  }
  #scoreDisplay .label { font-size: 9px; color: #0088aa; display: block; margin-bottom: 2px; letter-spacing: 3px; }

  #waveDisplay {
    position: fixed; top: 12px; right: 16px;
    font-family: 'Orbitron', monospace; font-size: 14px;
    color: #ff6600; z-index: 20;
    text-shadow: 0 0 10px rgba(255,102,0,0.5); text-align: right; letter-spacing: 2px; display: none;
  }
  #waveDisplay .label { font-size: 9px; color: #aa5500; display: block; margin-bottom: 2px; letter-spacing: 3px; }

  #hpBar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: 160px; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; z-index: 20; overflow: hidden;
    border: 1px solid rgba(0,240,255,0.15); display: none;
  }
  #hpFill { height: 100%; width: 100%; border-radius: 3px; transition: width 0.3s ease; box-shadow: 0 0 8px rgba(0,240,255,0.4); }

  .screen-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    background: radial-gradient(ellipse at center, rgba(5,6,20,0.93) 0%, rgba(2,2,8,0.98) 100%);
  }
  .title { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900; color: #fff; letter-spacing: 6px; text-shadow: 0 0 30px rgba(0,240,255,0.4); margin-bottom: 6px; }
  .subtitle { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #0099bb; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; }
  .tapHint { font-family: 'Rajdhani', sans-serif; font-size: 15px; color: rgba(0,240,255,0.6); letter-spacing: 4px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .decorLine { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #00f0ff, transparent); margin: 12px 0 20px; }

  /* Ship Select */
  #selectScreen { display: none; }
  .selectTitle { font-family: 'Orbitron', monospace; font-size: 15px; color: #fff; letter-spacing: 5px; margin-bottom: 24px; text-shadow: 0 0 15px rgba(0,240,255,0.3); }
  .shipGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; max-width: 360px; width: 100%; }
  .shipCard {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 14px 8px 12px; text-align: center;
    cursor: pointer; transition: all 0.2s ease; pointer-events: auto;
    position: relative; overflow: hidden;
  }
  .shipCard::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 12px; opacity: 0; transition: opacity 0.2s ease;
  }
  .shipCard:active { transform: scale(0.96); border-color: rgba(255,255,255,0.3); }
  .shipCard:active::before { opacity: 1; }
  .shipCard canvas { display: block; margin: 0 auto 8px; }
  .shipName { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1.5px; margin-bottom: 4px; }
  .shipAbility { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 1px; opacity: 0.5; margin-bottom: 8px; }
  .statBars { display: flex; flex-direction: column; gap: 3px; }
  .statRow { display: flex; align-items: center; gap: 5px; }
  .statLabel { font-family: 'Rajdhani', sans-serif; font-size: 8px; color: rgba(255,255,255,0.35); width: 26px; text-align: right; letter-spacing: 1px; }
  .statTrack { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .statFill { height: 100%; border-radius: 2px; }

  .ship0 .shipName { color: #00ddff; }
  .ship0::before { background: radial-gradient(ellipse at center, rgba(0,180,255,0.1) 0%, transparent 70%); }
  .ship1 .shipName { color: #ff6633; }
  .ship1::before { background: radial-gradient(ellipse at center, rgba(255,80,20,0.1) 0%, transparent 70%); }
  .ship2 .shipName { color: #88cc44; }
  .ship2::before { background: radial-gradient(ellipse at center, rgba(100,180,40,0.1) 0%, transparent 70%); }
  .ship3 .shipName { color: #bb88ff; }
  .ship3::before { background: radial-gradient(ellipse at center, rgba(150,100,255,0.1) 0%, transparent 70%); }

  /* Game Over */
  #gameOverScreen { display: none; }
  .gameOverTitle { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; color: #ff3344; letter-spacing: 8px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,51,68,0.4); }
  .finalScore { font-family: 'Orbitron', monospace; font-size: 46px; font-weight: 900; color: #00f0ff; text-shadow: 0 0 30px rgba(0,240,255,0.5); margin-bottom: 4px; }
  .finalLabel { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: #0088aa; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 12px; }
  .shipUsed { font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: 3px; margin-bottom: 30px; }
  .highScore { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #ff6600; letter-spacing: 3px; margin-bottom: 30px; }
</style>
</head>
<body>

<div id="gameContainer"><canvas id="gameCanvas"></canvas></div>

<div id="scoreDisplay"><span class="label">SCORE</span><span id="scoreVal">0</span></div>
<div id="waveDisplay"><span class="label">WAVE</span><span id="waveVal">1</span></div>
<div id="hpBar"><div id="hpFill"></div></div>

<div id="startScreen" class="screen-overlay">
  <div class="title">NOVA</div>
  <div class="subtitle">STRIKE</div>
  <div class="decorLine"></div>
  <div class="tapHint">TAP TO START</div>
</div>

<div id="selectScreen" class="screen-overlay" style="display:none;">
  <div class="selectTitle">SELECT SHIP</div>
  <div class="shipGrid" id="shipGrid"></div>
</div>

<div id="gameOverScreen" class="screen-overlay" style="display:none;">
  <div class="gameOverTitle">DESTROYED</div>
  <div class="finalScore" id="finalScoreVal">0</div>
  <div class="finalLabel">POINTS</div>
  <div class="shipUsed" id="shipUsedText"></div>
  <div class="highScore" id="highScoreText">BEST: 0</div>
  <div class="tapHint">TAP TO RETRY</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, sc;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  sc = window.devicePixelRatio || 1;
  canvas.width = W * sc; canvas.height = H * sc;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(sc, 0, 0, sc, 0, 0);
}
resize();
window.addEventListener('resize', resize);

/* ─── SHIPS ─── */
const SHIPS = [
  { id:0, name:'アストライア-V', desc:'バランス型', color:'#00ddff', hp:5, speed:1.0, fireRate:10, damage:1, bulletSpread:0, stats:{atk:3,spd:3,def:3} },
  { id:1, name:'ハヤブサ-M',     desc:'高速連射型', color:'#ff6633', hp:3, speed:1.3, fireRate:5,  damage:1, bulletSpread:0, stats:{atk:5,spd:5,def:1} },
  { id:2, name:'フォートレス-A', desc:'重装甲型',   color:'#88cc44', hp:8, speed:0.7, fireRate:16, damage:2, bulletSpread:0, stats:{atk:4,spd:1,def:5} },
  { id:3, name:'イージス-E',     desc:'拡散射撃型', color:'#bb88ff', hp:4, speed:1.0, fireRate:12, damage:1, bulletSpread:2, stats:{atk:3,spd:3,def:2} },
];

/* ─── SHIP PREVIEW DRAWING ─── */
function drawShipPreview(cvs, id) {
  const c = cvs.getContext('2d');
  const s = SHIPS[id], cx = 50, cy = 50;
  c.clearRect(0,0,100,100);

  // Glow
  const g = c.createRadialGradient(cx,cy,0,cx,cy,38);
  g.addColorStop(0, s.color+'30'); g.addColorStop(1,'transparent');
  c.fillStyle = g; c.fillRect(0,0,100,100);

  // Thruster
  const tg = c.createRadialGradient(cx,cy+22,0,cx,cy+22,12);
  tg.addColorStop(0, s.color+'99'); tg.addColorStop(1,'transparent');
  c.fillStyle = tg; c.beginPath(); c.arc(cx,cy+22,10,0,Math.PI*2); c.fill();

  if(id===0) {
    c.fillStyle='#e0f0ff';
    c.beginPath(); c.moveTo(cx,cy-24); c.lineTo(cx-18,cy+18); c.lineTo(cx-6,cy+10); c.lineTo(cx+6,cy+10); c.lineTo(cx+18,cy+18); c.closePath(); c.fill();
    c.fillStyle='#00ccff';
    c.beginPath(); c.moveTo(cx-6,cy-4); c.lineTo(cx-22,cy+16); c.lineTo(cx-14,cy+8); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(cx+6,cy-4); c.lineTo(cx+22,cy+16); c.lineTo(cx+14,cy+8); c.closePath(); c.fill();
    c.fillStyle='#00aaff';
    c.beginPath(); c.moveTo(cx,cy-18); c.lineTo(cx-4,cy+2); c.lineTo(cx+4,cy+2); c.closePath(); c.fill();
    c.strokeStyle='#00ddff'; c.lineWidth=1;
    c.beginPath(); c.moveTo(cx-18,cy+18); c.lineTo(cx-6,cy-6); c.moveTo(cx+18,cy+18); c.lineTo(cx+6,cy-6); c.stroke();
  } else if(id===1) {
    c.fillStyle='#1a1a2e';
    c.beginPath(); c.moveTo(cx,cy-26); c.lineTo(cx-14,cy+12); c.lineTo(cx+14,cy+12); c.closePath(); c.fill();
    c.fillStyle='#ff4422';
    c.beginPath(); c.moveTo(cx,cy-20); c.lineTo(cx-22,cy+20); c.lineTo(cx-8,cy+8); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(cx,cy-20); c.lineTo(cx+22,cy+20); c.lineTo(cx+8,cy+8); c.closePath(); c.fill();
    c.strokeStyle='#ff8844'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(cx,cy-22); c.lineTo(cx-18,cy+18); c.moveTo(cx,cy-22); c.lineTo(cx+18,cy+18); c.stroke();
    c.fillStyle='#4444aa'; c.beginPath(); c.ellipse(cx,cy-12,3,5,0,0,Math.PI*2); c.fill();
    [-10,0,10].forEach(dx=>{ c.fillStyle='#ff6622cc'; c.beginPath(); c.moveTo(cx+dx-3,cy+14); c.lineTo(cx+dx+3,cy+14); c.lineTo(cx+dx,cy+26); c.closePath(); c.fill(); });
  } else if(id===2) {
    c.fillStyle='#556b2f'; c.fillRect(cx-16,cy-12,32,28);
    c.fillStyle='#6b8e3a'; c.fillRect(cx-6,cy-20,12,12);
    c.fillStyle='#8faa50'; c.fillRect(cx-2,cy-26,4,10);
    c.fillStyle='#4a6320'; c.fillRect(cx-22,cy-6,8,18); c.fillRect(cx+14,cy-6,8,18);
    c.fillStyle='#5a7828'; c.fillRect(cx-20,cy-14,6,10); c.fillRect(cx+14,cy-14,6,10);
    c.strokeStyle='#aac66060'; c.lineWidth=1; c.strokeRect(cx-14,cy-10,28,24);
  } else {
    c.fillStyle='#8B7040';
    c.beginPath(); c.moveTo(cx,cy-20); c.lineTo(cx-12,cy+16); c.lineTo(cx+12,cy+16); c.closePath(); c.fill();
    c.fillStyle='#8844cc';
    c.beginPath(); c.moveTo(cx-6,cy-2); c.lineTo(cx-24,cy+14); c.lineTo(cx-12,cy+16); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(cx+6,cy-2); c.lineTo(cx+24,cy+14); c.lineTo(cx+12,cy+16); c.closePath(); c.fill();
    c.strokeStyle='#aa66ff66'; c.lineWidth=1.2;
    c.beginPath(); c.moveTo(cx-24,cy+14); c.lineTo(cx-6,cy-6); c.lineTo(cx,cy-20); c.lineTo(cx+6,cy-6); c.lineTo(cx+24,cy+14); c.stroke();
    c.fillStyle='#7766aa'; c.beginPath(); c.arc(cx,cy-26,5,0,Math.PI*2); c.fill();
    c.fillStyle='#aaaacc'; c.beginPath(); c.arc(cx,cy-26,3,0,Math.PI*2); c.fill();
    c.strokeStyle='#aa66ff44'; c.lineWidth=1;
    c.beginPath(); c.arc(cx,cy-26,10,Math.PI*1.1,Math.PI*1.9); c.stroke();
    c.beginPath(); c.arc(cx,cy-26,16,Math.PI*1.15,Math.PI*1.85); c.stroke();
    c.fillStyle='#6644aa'; c.beginPath(); c.ellipse(cx,cy-6,4,8,0,0,Math.PI*2); c.fill();
  }
}

function buildShipSelect() {
  const grid = document.getElementById('shipGrid');
  grid.innerHTML = '';
  SHIPS.forEach((s,i) => {
    const card = document.createElement('div');
    card.className = `shipCard ship${i}`;
    const cvs = document.createElement('canvas');
    cvs.width=100; cvs.height=100; cvs.style.width='80px'; cvs.style.height='80px';
    card.appendChild(cvs);
    const nm = document.createElement('div'); nm.className='shipName'; nm.textContent=s.name; card.appendChild(nm);
    const ab = document.createElement('div'); ab.className='shipAbility'; ab.textContent=s.desc; card.appendChild(ab);
    const bars = document.createElement('div'); bars.className='statBars';
    [['ATK',s.stats.atk],['SPD',s.stats.spd],['DEF',s.stats.def]].forEach(([l,v])=>{
      const r=document.createElement('div'); r.className='statRow';
      r.innerHTML=`<span class="statLabel">${l}</span><div class="statTrack"><div class="statFill" style="width:${v*20}%;background:${s.color};"></div></div>`;
      bars.appendChild(r);
    });
    card.appendChild(bars);
    const handler = (e) => { e.preventDefault(); e.stopPropagation(); selectShip(i); };
    card.addEventListener('click', handler);
    card.addEventListener('touchend', handler, {passive:false});
    grid.appendChild(card);
    drawShipPreview(cvs, i);
  });
}
buildShipSelect();

/* ─── STATE ─── */
const STATE = { MENU:0, SELECT:1, PLAYING:2, OVER:3 };
let state = STATE.MENU;
let selectedShip = 0;
let score=0, wave=1, highScore=0, frameCount=0, shakeTimer=0, shakeIntensity=0;

const stars = [];
for(let i=0;i<80;i++) stars.push({x:Math.random()*1000,y:Math.random()*2000,size:Math.random()*1.5+0.3,speed:Math.random()*1.5+0.5,brightness:Math.random()*0.5+0.3});

const player = {
  x:0,y:0,w:28,h:32, hp:5,maxHp:5, fireRate:10,fireCooldown:0, invincible:0,powerLevel:0, shipDef:null,
  init(id){ const s=SHIPS[id]; this.shipDef=s; this.x=W/2; this.y=H-120; this.maxHp=s.hp; this.hp=s.hp; this.fireRate=s.fireRate; this.fireCooldown=0; this.invincible=0; this.powerLevel=0; }
};

let playerBullets=[], enemyBullets=[], enemies=[], particles=[], powerUps=[];
let waveTimer=0, enemiesInWave=0, enemiesSpawned=0;
let touchActive=false, touchX=0, touchY=0;

const ENEMY_TYPES = {
  basic:  {w:22,h:22,hp:1,speed:2,  score:100, color:'#ff4466',fireRate:0},
  shooter:{w:24,h:24,hp:2,speed:1.5,score:200, color:'#ff8800',fireRate:90},
  fast:   {w:18,h:18,hp:1,speed:4,  score:150, color:'#ffcc00',fireRate:0},
  tank:   {w:32,h:32,hp:5,speed:1,  score:500, color:'#ff2288',fireRate:60},
  zigzag: {w:20,h:20,hp:2,speed:2.5,score:250, color:'#aa44ff',fireRate:0}
};

/* ─── DRAW PLAYER IN-GAME ─── */
function drawPlayerInGame(x, y) {
  const p = player;
  if(p.invincible>0 && Math.floor(frameCount/3)%2) return;
  ctx.save(); ctx.translate(x,y);
  const s = p.shipDef;
  const flicker = Math.sin(frameCount*0.5)*2;

  // Thruster
  const tg = ctx.createRadialGradient(0,p.h/2+6,0,0,p.h/2+6,14+flicker);
  tg.addColorStop(0,s.color+'cc'); tg.addColorStop(0.4,s.color+'44'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg; ctx.fillRect(-12,p.h/2-2,24,22);

  if(s.id===0) {
    ctx.fillStyle='#e0f0ff';
    ctx.beginPath(); ctx.moveTo(0,-p.h/2); ctx.lineTo(-p.w/2,p.h/2); ctx.lineTo(-p.w/4,p.h/3); ctx.lineTo(p.w/4,p.h/3); ctx.lineTo(p.w/2,p.h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#00ccff';
    ctx.beginPath(); ctx.moveTo(-5,-3); ctx.lineTo(-p.w/2+2,p.h/2-2); ctx.lineTo(-p.w/4+2,p.h/3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(5,-3); ctx.lineTo(p.w/2-2,p.h/2-2); ctx.lineTo(p.w/4-2,p.h/3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#00aaff';
    ctx.beginPath(); ctx.moveTo(0,-p.h/2+4); ctx.lineTo(-4,p.h/6); ctx.lineTo(4,p.h/6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#00ddff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-p.w/2+2,p.h/2-2); ctx.lineTo(-4,-4); ctx.moveTo(p.w/2-2,p.h/2-2); ctx.lineTo(4,-4); ctx.stroke();
  } else if(s.id===1) {
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath(); ctx.moveTo(0,-p.h/2); ctx.lineTo(-12,p.h/2-4); ctx.lineTo(12,p.h/2-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff4422';
    ctx.beginPath(); ctx.moveTo(0,-p.h/2+4); ctx.lineTo(-p.w/2-2,p.h/2+2); ctx.lineTo(-7,p.h/4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,-p.h/2+4); ctx.lineTo(p.w/2+2,p.h/2+2); ctx.lineTo(7,p.h/4); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ff8844'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(0,-p.h/2+2); ctx.lineTo(-p.w/2,p.h/2); ctx.moveTo(0,-p.h/2+2); ctx.lineTo(p.w/2,p.h/2); ctx.stroke();
    ctx.fillStyle='#4444aa'; ctx.beginPath(); ctx.ellipse(0,-p.h/2+12,3,5,0,0,Math.PI*2); ctx.fill();
    [-8,0,8].forEach(dx=>{ ctx.fillStyle='#ff6622cc'; ctx.beginPath(); ctx.moveTo(dx-2,p.h/2); ctx.lineTo(dx+2,p.h/2); ctx.lineTo(dx,p.h/2+10+flicker); ctx.closePath(); ctx.fill(); });
  } else if(s.id===2) {
    ctx.fillStyle='#556b2f'; ctx.fillRect(-14,-10,28,26);
    ctx.fillStyle='#6b8e3a'; ctx.fillRect(-5,-18,10,12);
    ctx.fillStyle='#8faa50'; ctx.fillRect(-2,-24,4,10);
    ctx.fillStyle='#4a6320'; ctx.fillRect(-20,-4,8,16); ctx.fillRect(12,-4,8,16);
    ctx.fillStyle='#5a7828'; ctx.fillRect(-18,-12,6,10); ctx.fillRect(12,-12,6,10);
    ctx.strokeStyle='#aac66060'; ctx.lineWidth=1; ctx.strokeRect(-12,-8,24,22);
  } else {
    ctx.fillStyle='#8B7040';
    ctx.beginPath(); ctx.moveTo(0,-p.h/2+2); ctx.lineTo(-10,p.h/2); ctx.lineTo(10,p.h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8844cc';
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(-22,p.h/2-2); ctx.lineTo(-10,p.h/2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(22,p.h/2-2); ctx.lineTo(10,p.h/2); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#aa66ff66'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(-22,p.h/2-2); ctx.lineTo(-5,-4); ctx.lineTo(0,-p.h/2+2); ctx.lineTo(5,-4); ctx.lineTo(22,p.h/2-2); ctx.stroke();
    ctx.fillStyle='#7766aa'; ctx.beginPath(); ctx.arc(0,-p.h/2-4,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aaaacc'; ctx.beginPath(); ctx.arc(0,-p.h/2-4,2.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#aa66ff33'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,-p.h/2-4,8,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
    ctx.fillStyle='#6644aa'; ctx.beginPath(); ctx.ellipse(0,-2,3,7,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ─── DRAW ENEMY ─── */
function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x,e.y);
  const gg=ctx.createRadialGradient(0,0,0,0,0,e.w); gg.addColorStop(0,e.color+'40'); gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.fillRect(-e.w,-e.w,e.w*2,e.w*2);
  ctx.fillStyle=e.color; ctx.globalAlpha=0.9;
  if(e.type==='tank'){
    ctx.beginPath(); for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*e.w/2,Math.sin(a)*e.w/2):ctx.lineTo(Math.cos(a)*e.w/2,Math.sin(a)*e.w/2);} ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.stroke();
  } else if(e.type==='fast'){
    ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,0);ctx.lineTo(0,e.h/2);ctx.lineTo(-e.w/2,0);ctx.closePath();ctx.fill();
  } else {
    ctx.beginPath();ctx.moveTo(-e.w/2,-e.h/2);ctx.lineTo(e.w/2,-e.h/2);ctx.lineTo(0,e.h/2);ctx.closePath();ctx.fill();
  }
  if(e.maxHp>1){ctx.globalAlpha=0.7;const bw=e.w;ctx.fillStyle='#333';ctx.fillRect(-bw/2,-e.h/2-8,bw,3);ctx.fillStyle=e.color;ctx.fillRect(-bw/2,-e.h/2-8,bw*(e.hp/e.maxHp),3);}
  ctx.restore();
}

/* ─── HELPERS ─── */
function spawnParticles(x,y,col,n,sp){ for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*sp+1; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:Math.random()*0.03+0.02,size:Math.random()*3+1,color:col});} }
function spawnPowerUp(x,y){ if(Math.random()<0.15) powerUps.push({x,y,vy:1.5,type:Math.random()<0.5?'power':'heal',w:16,h:16}); }
function spawnWave(){ wave++; document.getElementById('waveVal').textContent=wave; enemiesInWave=5+wave*2; enemiesSpawned=0; waveTimer=0; }
function spawnEnemy(){
  let t=['basic']; if(wave>=2)t.push('fast'); if(wave>=3)t.push('shooter'); if(wave>=4)t.push('zigzag'); if(wave>=5)t.push('tank');
  const tn=t[Math.floor(Math.random()*t.length)], tp=ENEMY_TYPES[tn];
  enemies.push({x:Math.random()*(W-60)+30,y:-40,...tp,maxHp:tp.hp,type:tn,fireCooldown:Math.random()*tp.fireRate,phase:Math.random()*Math.PI*2,alive:true});
  enemiesSpawned++;
}

function firePlayerBullet(){
  const s=player.shipDef, bx=player.x, by=player.y-player.h/2, d=s.damage, c=s.color;
  playerBullets.push({x:bx,y:by,vy:-10,vx:0,w:3,h:12,dmg:d,col:c});
  const spread=s.bulletSpread+player.powerLevel;
  if(spread>=1){ playerBullets.push({x:bx-10,y:by+4,vy:-9.5,vx:-1.2,w:2,h:10,dmg:d,col:c}); playerBullets.push({x:bx+10,y:by+4,vy:-9.5,vx:1.2,w:2,h:10,dmg:d,col:c}); }
  if(spread>=2){ playerBullets.push({x:bx-18,y:by+8,vy:-8.5,vx:-2.2,w:2,h:8,dmg:d,col:c}); playerBullets.push({x:bx+18,y:by+8,vy:-8.5,vx:2.2,w:2,h:8,dmg:d,col:c}); }
  if(spread>=3){ playerBullets.push({x:bx-24,y:by+10,vy:-7,vx:-3,w:2,h:8,dmg:d,col:c}); playerBullets.push({x:bx+24,y:by+10,vy:-7,vx:3,w:2,h:8,dmg:d,col:c}); }
}

function rectsOverlap(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2;}

/* ─── UPDATE ─── */
function update(){
  frameCount++;
  stars.forEach(s=>{s.y+=s.speed;if(s.y>H+10){s.y=-10;s.x=Math.random()*W;}});
  if(state!==STATE.PLAYING) return;

  const spd=player.shipDef.speed;
  if(touchActive){ player.x+=(touchX-player.x)*0.12*spd; player.y+=((touchY-60)-player.y)*0.12*spd; }
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  player.y=Math.max(player.h/2,Math.min(H-player.h/2,player.y));

  player.fireCooldown--;
  if(player.fireCooldown<=0){ firePlayerBullet(); player.fireCooldown=Math.max(3,player.fireRate-player.powerLevel*2); }
  if(player.invincible>0) player.invincible--;

  playerBullets.forEach(b=>{b.y+=b.vy;b.x+=(b.vx||0);});
  playerBullets=playerBullets.filter(b=>b.y>-20&&b.x>-30&&b.x<W+30);
  enemyBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  enemyBullets=enemyBullets.filter(b=>b.y<H+20&&b.y>-20&&b.x>-20&&b.x<W+20);

  waveTimer++;
  const sr=Math.max(20,60-wave*4);
  if(waveTimer%sr===0&&enemiesSpawned<enemiesInWave) spawnEnemy();
  if(enemiesSpawned>=enemiesInWave&&enemies.length===0) spawnWave();

  enemies.forEach(e=>{
    e.y+=e.speed;
    if(e.type==='zigzag') e.x+=Math.sin(e.y*0.04+e.phase)*3;
    if(e.fireRate>0){e.fireCooldown--;if(e.fireCooldown<=0){e.fireCooldown=e.fireRate;const a=Math.atan2(player.y-e.y,player.x-e.x);enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,w:6,h:6});}}
  });

  playerBullets.forEach(b=>{
    enemies.forEach(e=>{
      if(e.alive&&rectsOverlap(b,e)){
        b.y=-100;e.hp-=b.dmg; spawnParticles(b.x,b.y,'#fff',3,2);
        if(e.hp<=0){e.alive=false;score+=e.score;document.getElementById('scoreVal').textContent=score;spawnParticles(e.x,e.y,e.color,15,5);spawnPowerUp(e.x,e.y);shakeTimer=6;shakeIntensity=3;}
      }
    });
  });
  enemies=enemies.filter(e=>e.alive&&e.y<H+50);

  if(player.invincible<=0){
    enemyBullets.forEach(b=>{
      if(rectsOverlap(b,player)){b.y=H+100;player.hp--;player.invincible=60;shakeTimer=10;shakeIntensity=6;spawnParticles(player.x,player.y,player.shipDef.color,10,4);document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';if(player.hp<=0)gameOver();}
    });
    enemies.forEach(e=>{
      if(e.alive&&rectsOverlap(e,player)){e.alive=false;player.hp--;player.invincible=60;shakeTimer=12;shakeIntensity=8;spawnParticles(e.x,e.y,e.color,12,5);spawnParticles(player.x,player.y,player.shipDef.color,8,3);document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';if(player.hp<=0)gameOver();}
    });
  }

  powerUps.forEach(p=>{
    p.y+=p.vy;
    if(rectsOverlap(p,player)){p.y=H+200;if(p.type==='power'){player.powerLevel=Math.min(3,player.powerLevel+1);spawnParticles(player.x,player.y,'#ffcc00',10,4);}else{player.hp=Math.min(player.maxHp,player.hp+1);document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';spawnParticles(player.x,player.y,'#00ff88',10,4);}}
  });
  powerUps=powerUps.filter(p=>p.y<H+50);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.97;p.vy*=0.97;});
  particles=particles.filter(p=>p.life>0);
  if(shakeTimer>0) shakeTimer--;
}

/* ─── DRAW ─── */
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeTimer>0) ctx.translate((Math.random()-0.5)*shakeIntensity,(Math.random()-0.5)*shakeIntensity);

  const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#050610'); bg.addColorStop(0.5,'#08091a'); bg.addColorStop(1,'#0a0c22');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const nb=ctx.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,W*0.6);
  nb.addColorStop(0,'rgba(20,10,60,0.15)'); nb.addColorStop(0.5,'rgba(10,5,40,0.08)'); nb.addColorStop(1,'transparent');
  ctx.fillStyle=nb; ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{const f=0.7+Math.sin(frameCount*0.1+s.x)*0.3; ctx.globalAlpha=s.brightness*f; ctx.fillStyle='#c8deff'; ctx.fillRect(s.x%W,s.y%H,s.size,s.size);});
  ctx.globalAlpha=1;

  if(state===STATE.PLAYING||state===STATE.OVER){
    playerBullets.forEach(b=>{
      const c=b.col||'#00ffcc';
      const g2=ctx.createLinearGradient(b.x,b.y-b.h/2,b.x,b.y+b.h/2); g2.addColorStop(0,c); g2.addColorStop(1,c+'88');
      ctx.fillStyle=g2; ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
      ctx.globalAlpha=0.3; ctx.fillStyle=c; ctx.fillRect(b.x-b.w,b.y-b.h/2,b.w*2,b.h); ctx.globalAlpha=1;
    });
    enemyBullets.forEach(b=>{
      ctx.fillStyle='#ff4444'; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.3; ctx.fillStyle='#ff0000'; ctx.beginPath(); ctx.arc(b.x,b.y,6,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    });
    enemies.forEach(e=>drawEnemy(e));
    powerUps.forEach(p=>{
      const gl=Math.sin(frameCount*0.15)*0.3+0.7; ctx.globalAlpha=gl;
      ctx.fillStyle=p.type==='power'?'#ffcc00':'#00ff88'; ctx.beginPath(); ctx.arc(p.x,p.y,8,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.4; ctx.strokeStyle=p.type==='power'?'#ffaa00':'#00cc66'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
      ctx.fillStyle='#000'; ctx.font='9px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.type==='power'?'▲':'+',p.x,p.y);
    });
    if(state===STATE.PLAYING) drawPlayerInGame(player.x,player.y);
    particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

/* ─── STATE ─── */
function showSelect(){ state=STATE.SELECT; document.getElementById('startScreen').style.display='none'; document.getElementById('gameOverScreen').style.display='none'; document.getElementById('selectScreen').style.display='flex'; }
function selectShip(id){
  selectedShip=id;
  document.getElementById('selectScreen').style.display='none';
  startGame(id);
}
function startGame(shipId){
  score=0;wave=1;frameCount=0; playerBullets=[];enemyBullets=[];enemies=[];particles=[];powerUps=[]; enemiesInWave=7;enemiesSpawned=0;waveTimer=0;
  player.init(shipId);
  const s=SHIPS[shipId];
  document.getElementById('hpFill').style.background=`linear-gradient(90deg, ${s.color}, ${s.color}88)`;
  document.getElementById('scoreVal').textContent='0'; document.getElementById('waveVal').textContent='1';
  document.getElementById('hpFill').style.width='100%';
  ['scoreDisplay','waveDisplay','hpBar'].forEach(id=>document.getElementById(id).style.display='block');
  state=STATE.PLAYING;
}
function gameOver(){
  state=STATE.OVER;
  if(score>highScore) highScore=score;
  document.getElementById('finalScoreVal').textContent=score;
  document.getElementById('highScoreText').textContent='BEST: '+highScore;
  document.getElementById('shipUsedText').textContent=player.shipDef.name;
  document.getElementById('shipUsedText').style.color=player.shipDef.color;
  document.getElementById('gameOverScreen').style.display='flex';
  ['scoreDisplay','waveDisplay','hpBar'].forEach(id=>document.getElementById(id).style.display='none');
}

/* ─── INPUT ─── */
function handleTouchStart(e){ e.preventDefault(); if(state===STATE.MENU||state===STATE.OVER){showSelect();return;} if(state===STATE.SELECT)return; const t=e.touches[0]; touchActive=true; touchX=t.clientX; touchY=t.clientY; }
function handleTouchMove(e){ e.preventDefault(); if(!touchActive)return; const t=e.touches[0]; touchX=t.clientX; touchY=t.clientY; }
function handleTouchEnd(e){ e.preventDefault(); touchActive=false; }
function handleMouseDown(e){ if(state===STATE.MENU||state===STATE.OVER){showSelect();return;} if(state===STATE.SELECT)return; touchActive=true; touchX=e.clientX; touchY=e.clientY; }
function handleMouseMove(e){ if(!touchActive)return; touchX=e.clientX; touchY=e.clientY; }
function handleMouseUp(){ touchActive=false; }

canvas.addEventListener('touchstart',handleTouchStart,{passive:false});
canvas.addEventListener('touchmove',handleTouchMove,{passive:false});
canvas.addEventListener('touchend',handleTouchEnd,{passive:false});
canvas.addEventListener('mousedown',handleMouseDown);
canvas.addEventListener('mousemove',handleMouseMove);
canvas.addEventListener('mouseup',handleMouseUp);

document.getElementById('startScreen').addEventListener('touchstart',e=>{e.preventDefault();showSelect();},{passive:false});
document.getElementById('startScreen').addEventListener('click',showSelect);
document.getElementById('gameOverScreen').addEventListener('touchstart',e=>{e.preventDefault();showSelect();},{passive:false});
document.getElementById('gameOverScreen').addEventListener('click',showSelect);

/* ─── LOOP ─── */
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
